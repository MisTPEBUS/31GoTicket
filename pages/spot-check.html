<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        景點打卡
    </title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js">
    </script>

    <script src="https://cdn.tailwindcss.com">
    </script>

</head>

<body class="bg-gray-100 min-h-screen">

    <div class="flex items-center justify-center min-h-screen p-4">

        <div class="bg-white rounded-2xl shadow p-8 w-full max-w-md text-center">

            <h1 class="text-2xl font-bold mb-4">
                景點打卡
            </h1>

            <!--      <div id="loading" class="text-gray-500">
                打卡驗證中...
            </div> -->

            <div id="successBox" class="hidden">

                <div class="text-green-600 text-5xl mb-4">
                    ✓
                </div>

                <h2 class="text-xl font-bold mb-2">
                    打卡成功
                </h2>

                <p id="successMessage" class="text-gray-600">
                </p>

            </div>

            <div id="errorBox" class="hidden">

                <div class="text-red-500 text-5xl mb-4">
                    ✕
                </div>

                <h2 class="text-xl font-bold mb-2">
                    打卡失敗
                </h2>

                <p id="errorMessage" class="text-gray-600">
                </p>

            </div>

        </div>

    </div>

    <script type="module" src="../assets/js/spot-check.js">
    </script>

</body>

</html>
