<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>
        三鶯 GO - 活動報名
    </title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js">
    </script>

    <script src="https://cdn.tailwindcss.com">
    </script>
</head>

<body class="bg-gray-100 min-h-screen">

    <div class="max-w-md mx-auto p-4">

        <div class="bg-white rounded-2xl shadow p-6">

            <h1 class="text-2xl font-bold mb-6">
                三鶯 GO 活動報名
            </h1>

            <div id="loading" class="text-gray-500">
                載入中...
            </div>

            <form id="registerForm" class="space-y-4 hidden">

                <div>
                    <label class="block mb-1">
                        LINE User ID
                    </label>

                    <input id="lineUserId" class="w-full border rounded px-3 py-2 bg-gray-100" readonly />
                </div>

                <div>
                    <label class="block mb-1">
                        姓名
                    </label>

                    <input id="name" class="w-full border rounded px-3 py-2" />
                </div>

                <div>
                    <label class="block mb-1">
                        電話
                    </label>

                    <input id="phone" class="w-full border rounded px-3 py-2" placeholder="+886912345678" />
                </div>

                <div>
                    <label class="block mb-1">
                        Email
                    </label>

                    <input id="email" type="email" class="w-full border rounded px-3 py-2" />
                </div>

                <div>
                    <label class="block mb-1">
                        訂單號碼
                    </label>

                    <input id="orderNo" class="w-full border rounded px-3 py-2" />
                </div>

                <button type="submit" class="w-full bg-black text-white py-3 rounded-xl">
                    立即參加
                </button>

            </form>

        </div>

    </div>

    <script type="module" src="../assets/js/register.js">
    </script>

</body>

</html>
