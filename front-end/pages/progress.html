<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8" />

    <meta name="viewport" content=" width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no " />

    <title>
        三鶯 GO
    </title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js">
    </script>

    <script src="https://cdn.tailwindcss.com">
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    <style>
        html,
        body {
            touch-action: manipulation;
        }

        body {
            font-family:
                "Noto Sans TC",
                sans-serif;
        }
    </style>

</head>

<body class="bg-[#F5F7FA] text-[#1F2937] min-h-screen">

    <!-- Hero -->

    <section
        class="relative overflow-hidden bg-gradient-to-br from-[#183B5B] via-[#295A86] to-[#4E89B9] rounded-b-[42px] px-6 pt-10 pb-14 shadow-2xl">

        <!-- Light -->

        <div class="absolute top-0 right-0 w-72 h-72 bg-white/10 blur-3xl rounded-full">
        </div>

        <div class="relative z-10">

            <!-- Top Action -->

            <div class="absolute top-6 right-6 z-20 flex items-center gap-3">

                <!-- Gift -->

                <button
                    class="relative w-12 h-12 rounded-2xl bg-white/10 backdrop-blur-xl border border-white/10 flex items-center justify-center shadow-lg">

                    <!-- Badge -->

                    <div
                        class="absolute -top-1 -right-1 min-w-[22px] h-[22px] px-1 rounded-full bg-red-500 text-white text-[11px] font-bold flex items-center justify-center">
                        2
                    </div>

                    <!-- Icon -->

                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M20 12v7a2 2 0 01-2 2H6a2 2 0 01-2-2v-7" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M2 7h20v5H2z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M12 22V7" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M12 7H7.5a2.5 2.5 0 010-5c3 0 4.5 5 4.5 5z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M12 7h4.5a2.5 2.5 0 100-5c-3 0-4.5 5-4.5 5z" />
                    </svg>

                </button>



            </div>


            <!-- Badge -->

            <div
                class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white/10 border border-white/10 backdrop-blur text-cyan-50 text-xs tracking-[0.2em]">

                SANXIA • YINGGE GO TICKET

            </div>

            <!-- Title -->

            <div class="mt-6">

                <h1 class="text-white text-4xl font-black tracking-wide">
                    三鶯 GO
                </h1>

                <p class="text-cyan-50/90 mt-4 leading-7 text-sm">
                    透過景點集章探索三峽與鶯歌，
                    完成指定文化景點即可兌換活動限定紀念禮。
                </p>

            </div>

            <!-- Progress -->

            <div class="mt-8 bg-white/10 border border-white/10 backdrop-blur-xl rounded-[28px] p-5">

                <div class="flex items-center justify-between">

                    <div>

                        <p id="heroLabel" class="text-cyan-100 text-xs tracking-[0.15em]">
                            ACTIVITY PROGRESS
                        </p>

                        <h2 id="heroTitle" class="text-white text-3xl font-black mt-2">
                            n /n
                        </h2>

                    </div>

                    <div class="text-right">

                        <p class="text-cyan-100 text-xs">
                            NEXT SPOT
                        </p>

                        <p id="NextSPOT" class="text-white font-bold mt-1">
                            XXXXX
                        </p>

                    </div>

                </div>

                <!-- Progress Bar -->

                <div class="w-full h-3 rounded-full bg-white/10 overflow-hidden mt-6">

                    <div id="progressBar"
                        class="h-full rounded-full bg-gradient-to-r from-cyan-300 via-sky-300 to-white"
                        style="width: 100%">
                    </div>

                </div>

                <!-- Status -->

                <div class="flex items-center justify-between mt-4 text-xs text-cyan-100">

                    <span id="completedText">
                        已完成 0 個景點
                    </span>

                    <span id="remainingText">
                        尚差 0 個景點
                    </span>

                </div>

            </div>

        </div>

    </section>

    <!-- Content -->

    <main class="max-w-md mx-auto px-4 pb-10 -mt-6">

        <!-- Current Mission -->

        <!-- Spot Carousel -->

        <section class="mt-6 overflow-x-auto no-scrollbar">

            <section class="mt-6 px-1">
                <div id="spotCarousel" class=" flex gap-4 overflow-x-auto snap-x snap-mandatory no-scrollbar pb-2 ">
                </div>
            </section>

        </section>



        <!-- Spot List -->
        <section id="spotList" class="space-y-4 mt-6"> </section>

        <section class="space-y-4 mt-6" style="display:none">
            <div
                class="bg-white rounded-2xl shadow p-4 flex items-center justify-between border-2 border-dashed border-gray-300">

                <div>

                    <h2 class="font-bold text-lg text-gray-400">
                        新北市美術館
                    </h2>

                    <p class="text-sm text-gray-400 mt-1">
                        尚未完成
                    </p>

                </div>

                <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-red-400 text-xl">
                    X
                </div>

            </div>

            <!-- Completed -->

            <div class="bg-white rounded-[28px] border border-slate-100 shadow-lg p-5 ">

                <div class="flex items-center justify-between">

                    <div>

                        <p class="text-xs tracking-[0.2em] text-slate-400">
                            COMPLETED
                        </p>

                        <h3 class="font-black text-lg mt-2">
                            新北市客家文化園區
                        </h3>

                        <p class="text-sm text-slate-500 mt-2">
                            已完成景點集章
                        </p>

                    </div>

                    <div class="w-11 h-11 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">

                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>

                    </div>

                </div>

            </div>

            <!-- Completed -->

            <div class="bg-white rounded-[28px] border border-slate-100 shadow-lg p-5 ">

                <div class="flex items-center justify-between">

                    <div>

                        <p class="text-xs tracking-[0.2em] text-slate-400">
                            COMPLETED
                        </p>

                        <h3 class="font-black text-lg mt-2">
                            鶯歌陶瓷博物館
                        </h3>

                        <p class="text-sm text-slate-500 mt-2">
                            已完成景點集章
                        </p>

                    </div>

                    <div class="w-11 h-11 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center">

                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
                        </svg>

                    </div>

                </div>

            </div>

            <!-- Current -->

            <div class="bg-gradient-to-br from-[#183B5B] to-[#2C628F] rounded-[30px] shadow-2xl p-5 text-white ">

                <p class="text-xs tracking-[0.2em] text-cyan-100">
                    IN PROGRESS
                </p>

                <h3 class="text-2xl font-black mt-3">
                    新北市美術館
                </h3>

                <p class="text-cyan-100 text-sm leading-7 mt-3">
                    前往現場掃描 QRCode，
                    完成最後一站景點集章。
                </p>

                <button id="scanButton" class="mt-6 rounded-2xl bg-white text-[#183B5B] px-6 py-3 font-bold shadow-lg">
                    前往打卡
                </button>
            </div>
        </section>
        <!-- Reward -->

        <div class="mt-6 bg-white rounded-3xl shadow p-6 text-center">

            <h2 class="text-xl font-bold mb-2">
                活動獎勵
            </h2>

            <p class="text-gray-500 mb-4">
                完成全部景點即可兌換限量紀念禮
            </p>

            <button class="w-full bg-gray-300 text-gray-500 py-3 rounded-2xl cursor-not-allowed" disabled>
                尚未達成領獎資格
            </button>

        </div>
    </main>



    <script type="module" src="../assets/js/progress.js">
    </script>
</body>

</html>
